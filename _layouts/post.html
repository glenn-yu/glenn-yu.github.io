---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%Y년 %-m월 %-d일" }}
      </time>
      {% if page.tags and page.tags.size > 0 %}
        <span class="dot">·</span>
        {% for tag in page.tags %}<span class="tag">#{{ tag }}</span>{% unless forloop.last %} {% endunless %}{% endfor %}
      {% endif %}
    </p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="post-footer">
    <a class="back-link" href="{{ '/' | relative_url }}">← 모든 글</a>
  </footer>
</article>
