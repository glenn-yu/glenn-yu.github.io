# Site
title: Glenn Yu
tagline: Software Engineer · Problem Solver
description: >-
  모바일, 웹, 서버, 그리고 그 사이의 기술적 가치를 탐구합니다. 만들고, 기록하며 성장합니다.

url: "https://glenn-yu.github.io"
baseurl: ""

# Author
author:
  name: Glenn Yu
  email: gwangy.yu@gmail.com
  github: glenn-yu
  website: https://gwangy.com
  naver_blog: https://blog.naver.com/kcskiller

# Build
markdown: kramdown
highlighter: rouge
permalink: /posts/:title/
timezone: Asia/Seoul

plugins:
  - jekyll-feed
  - jekyll-sitemap

# Pagination (display N posts on home)
paginate: 5

# 미래 날짜 포스트도 발행 (글 예약·미리보기용)
future: true

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
  - .gitignore
