# Site
title: Glenn Yu
tagline: Mobile · Adtech Engineer
description: >-
  모바일과 광고 SDK 사이 어딘가. 만들고, 부수고, 기록합니다.

url: "https://glenn-yu.github.io"
baseurl: ""

# Author
author:
  name: Glenn Yu
  email: gwangy.yu@gmail.com
  github: glenn-yu
  website: https://gwangy.com
  naver_blog: https://blog.naver.com/kcskiller

# Build
markdown: kramdown
highlighter: rouge
permalink: /posts/:title/
timezone: Asia/Seoul

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Pagination (display N posts on home)
paginate: 5

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
  - .gitignore
