<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

<title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} · {{ site.tagline }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description }}">

<link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
<link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | absolute_url }}">

<!-- Favicons -->
<link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
<link rel="icon" type="image/png" sizes="64x64" href="{{ '/assets/favicon.png' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/assets/apple-touch-icon.png' | relative_url }}">

<!-- Open Graph / Twitter -->
<meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }} · {{ site.tagline }}{% endif %}">
<meta property="og:description" content="{{ page.description | default: page.excerpt | default: site.description | strip_html | truncate: 200 }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:image" content="{{ '/assets/og-image.png' | absolute_url }}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="1200">
<meta property="og:locale" content="ko_KR">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }} · {{ site.tagline }}{% endif %}">
<meta name="twitter:description" content="{{ page.description | default: page.excerpt | default: site.description | strip_html | truncate: 200 }}">
<meta name="twitter:image" content="{{ '/assets/og-image.png' | absolute_url }}">

<!-- Pretendard (한국어 친화 폰트) -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">

<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

{% if page.math %}
<!-- MathJax (수식 렌더링: front matter에 math: true 인 글에서만 로드) -->
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    },
    options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
{% endif %}

<!-- Pre-paint init: apply saved theme + flag boot-pending (avoids flash) -->
<script>
(function () {
  try {
    var t = localStorage.getItem('glenn:theme');
    if (t) document.documentElement.setAttribute('data-theme', t);
    if (sessionStorage.getItem('glenn:boot-seen') !== '1') {
      document.documentElement.classList.add('boot-pending');
    }
    // Safety: if JS fails, reveal page after 4s anyway
    setTimeout(function () {
      document.documentElement.classList.remove('boot-pending');
    }, 4000);
  } catch (e) {
    document.documentElement.classList.remove('boot-pending');
  }
})();
</script>

{% feed_meta %}
