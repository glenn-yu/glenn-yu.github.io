<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

<title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} · {{ site.tagline }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description }}">

<link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
<link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | absolute_url }}">

<!-- Pretendard (한국어 친화 폰트) -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">

<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

<!-- Pre-paint init: apply saved theme + flag boot-pending (avoids flash) -->
<script>
(function () {
  try {
    var t = localStorage.getItem('glenn:theme');
    if (t) document.documentElement.setAttribute('data-theme', t);
    if (sessionStorage.getItem('glenn:boot-seen') !== '1') {
      document.documentElement.classList.add('boot-pending');
    }
    // Safety: if JS fails, reveal page after 4s anyway
    setTimeout(function () {
      document.documentElement.classList.remove('boot-pending');
    }, 4000);
  } catch (e) {
    document.documentElement.classList.remove('boot-pending');
  }
})();
</script>
